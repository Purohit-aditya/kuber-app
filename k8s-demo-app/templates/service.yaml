apiVersion: v1
kind: Service
metadata:
  name: {{ include "k8s-demo-app.fullname" . }}
  labels:
    {{- include "k8s-demo-app.labels" . | nindent 4 }}
spec:
  selector:
    {{- include "k8s-demo-app.selectorLabels" . | nindent 4 }}
  type: {{ .Values.service.type }}
  ports:
    - name: http
      protocol: TCP
      port: {{ .Values.service.port }}
      targetPort: {{ .Values.service.targetPort }}
      {{- if and (eq .Values.service.type "NodePort") .Values.service.nodePort }}
      nodePort: {{ .Values.service.nodePort }}
      {{- end }}
